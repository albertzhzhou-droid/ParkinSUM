name: Bug report
description: Report a reproducible issue with the public prototype.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use synthetic or sample data only. Do not include personal health information, real medication schedules, symptoms, Firebase tokens, service account keys, user exports, raw audit logs, real emails, full UIDs, or local credential paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use synthetic/sample data only.
      placeholder: "1. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, Flutter version, OS, or command output with secrets removed.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed personal health information, real medication schedules, credentials, tokens, and private identifiers.
          required: true
        - label: This report does not ask for diagnosis, treatment, medication timing, dietary guidance, patient care, or emergency support.
          required: true
